<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Shop - Manjeet</title>
    <style>
        /* --- PREMIUM SHOP CSS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #020202; color: white; font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
            padding: 80px 20px; overflow-x: hidden;
        }

        /* Background Grid */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        .shop-header { text-align: center; margin-bottom: 60px; }
        h1 { 
            font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; letter-spacing: 5px; 
            text-transform: uppercase; background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .shop-subtitle { color: #00ff88; font-size: 1rem; letter-spacing: 3px; margin-top: 10px; opacity: 0.8; }

        /* Product Grid */
        .product-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; width: 100%; max-width: 1200px; padding: 20px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 30px; padding: 30px; text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px); position: relative;
        }

        .product-card:hover { 
            transform: translateY(-15px); border-color: #00ff88;
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.15);
        }

        /* Photo Area */
        .product-img {
            width: 100%; height: 350px; border-radius: 20px;
            background: #111;
            margin-bottom: 25px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .product-img img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.5s;
        }

        .product-card:hover .product-img img { transform: scale(1.1); }

        .badge {
            position: absolute; top: 20px; right: 20px; background: #00ff88;
            color: #000; font-size: 0.75rem; font-weight: 900; padding: 6px 15px;
            border-radius: 50px; text-transform: uppercase; z-index: 10;
        }

        .product-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .product-price { color: #00ff88; font-size: 1.8rem; font-weight: 800; margin-bottom: 25px; }

        .buy-btn {
            width: 100%; padding: 18px; border: none; border-radius: 50px;
            background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 1rem; 
            font-weight: 800; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; border: 1px solid #333;
        }

        .product-card:hover .buy-btn { 
            background: #00ff88; color: #000; border-color: #00ff88;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        .back-link { margin-top: 60px; color: #555; text-decoration: none; border: 1px solid #222; padding: 12px 40px; border-radius: 50px; transition: 0.3s; }
        .back-link:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <div class="shop-header">
        <h1 id="mainTitle">Official Shop</h1>
        <p class="shop-subtitle" id="subTitle">Exclusive Merchandise by Manjeet</p>
    </div>

    <div class="product-grid" id="productGrid">
        <!-- Products will be generated by JS -->
    </div>

    <a href="index.html" class="back-link" id="backBtn">← Back to Home</a>

    <script>
        // 1. भाषा का डेटा
        const currentLang = localStorage.getItem('selectedLang') || 'hi';
        
        const langData = {
            hi: {
                mainTitle: "ऑफिशियल दुकान",
                subTitle: "मंजीत द्वारा खास मर्चेंडाइज़",
                buy: "अभी खरीदें",
                back: "← वापस होम पेज पर"
            },
            en: {
                mainTitle: "Official Shop",
                subTitle: "Exclusive Merchandise by Manjeet",
                buy: "BUY NOW",
                back: "← BACK TO HOME"
            }
        };

        // 2. आपके प्रोडक्ट्स (मैंने यहाँ बेहतरीन ऑनलाइन फोटो लिंक डाल दिए हैं)
        const products = [
            { 
                hi: "लिमिटेड टी-शर्ट", en: "Limited T-Shirt", price: "₹999", 
                img: "https://images.unsplash.com", 
                badge: "HOT" 
            },
            { 
                hi: "ऑफिशियल कैप", en: "Official Cap", price: "₹499", 
                img: "https://images.unsplash.com", 
                badge: "NEW" 
            },
            { 
                hi: "प्रीमियम हुडी", en: "Premium Hoodie", price: "₹1,499", 
                img: "https://images.unsplash.com", 
                badge: "BEST" 
            }
        ];

        // 3. रेंडर फंक्शन
        function renderShop() {
            const grid = document.getElementById('productGrid');
            const t = langData[currentLang];
            
            document.getElementById('mainTitle').innerText = t.mainTitle;
            document.getElementById('subTitle').innerText = t.subTitle;
            document.getElementById('backBtn').innerText = t.back;

            grid.innerHTML = ''; 
            
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="badge">${p.badge}</div>
                        <div class="product-img">
                            <img src="${p.img}" alt="${p.en}">
                        </div>
                        <div class="product-name">${currentLang === 'hi' ? p.hi : p.en}</div>
                        <div class="product-price">${p.price}</div>
                        <button class="buy-btn" onclick="alert('Order Feature Coming Soon!')">${t.buy}</button>
                    </div>
                `;
            });
        }

        renderShop();
    </script>
</body>
</html>
