<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Manjeet Pro Gallery</title>
    <!-- Font Awesome Link (आइकॉन्स के लिए) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        /* डार्क थीम (यहाँ हमने ब्लैक की जगह गहरा नीला/ग्रे कलर डाला है) */
        :root { 
            --bg: #0f172a; /* प्रीमियम डार्क बैकग्राउंड */
            --text: #ffffff; 
            --card: #1e293b; 
            --border: #334155; 
            --accent: #38bdf8; 
        }
        /* लाइट थीम */
        [data-theme="light"] { 
            --bg: #f4f4f4; 
            --text: #000000; 
            --card: #ffffff; 
            --border: #dddddd; 
            --accent: #007bff;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            text-align: center; 
            transition: 0.4s; 
            margin: 0;
        }
        
        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--text); color: var(--bg); border: none; padding: 10px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 1001; }

        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 30px; }
        
        .img-card { display: flex; flex-direction: column; align-items: center; gap: 12px; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 310px; }
        .img-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        .gallery img { width: 280px; height: 380px; object-fit: cover; border-radius: 10px; cursor: zoom-in; }
        
        .btn-download { display: inline-block; color: var(--text); text-decoration: none; border: 1px solid var(--text); padding: 10px 25px; border-radius: 30px; transition: 0.3s; font-size: 14px; cursor: pointer; min-width: 160px; font-weight: bold; margin-top: 5px; }
        .btn-download:hover { background: var(--text); color: var(--bg); }
        
        /* Lightbox */
        #lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #lightboxImg { max-width: 90%; max-height: 80%; border: 2px solid #fff; border-radius: 10px; }
        #closeBtn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }

        .fa-spinner { animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Back Button को सेंटर में रखने के लिए */
        .back-btn-box { width: 100%; display: flex; justify-content: center; margin-top: 50px; }
    </style>
</head>
<body data-theme="dark">

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
        <i class="fas fa-sun"></i> Light Mode
    </button>

    <h1 id="pageTitle">My Photo Gallery</h1>
    
    <div class="gallery">
        <!-- 1st Image -->
        <div class="img-card">
            <img src="images/bg.jpg" onclick="openLightbox(this.src)">
            <a href="images/bg.jpg" download class="btn-download" onclick="triggerDownload(this, event)">
                <i class="fas fa-download"></i> Download
            </a>
        </div>
        <!-- 2nd Image -->
        <div class="img-card">
            <img src="images/manjeet.jpg" onclick="openLightbox(this.src)">
            <a href="images/manjeet.jpg" download class="btn-download" onclick="triggerDownload(this, event)">
                <i class="fas fa-download"></i> Download
            </a>
        </div>
        <!-- 3rd Image -->
        <div class="img-card">
            <img src="images/manjeet1.jpg" onclick="openLightbox(this.src)">
            <a href="images/manjeet1.jpg" download class="btn-download" onclick="triggerDownload(this, event)">
                <i class="fas fa-download"></i> Download
            </a>
        </div>
        <!-- 4th Image -->
        <div class="img-card">
            <img src="images/manjeet2.jpg" onclick="openLightbox(this.src)">
            <a href="images/manjeet2.jpg" download class="btn-download" onclick="triggerDownload(this, event)">
                <i class="fas fa-download"></i> Download
            </a>
        </div>
        <!-- 5th Image -->
        <div class="img-card">
            <img src="images/Lo.jpg" onclick="openLightbox(this.src)">
            <a href="images/Lo.jpg" download class="btn-download" onclick="triggerDownload(this, event)">
                <i class="fas fa-download"></i> Download
            </a>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span id="closeBtn">&times;</span>
        <img id="lightboxImg">
    </div>

    <!-- Back Button - अब यह सेंटर में है -->
    <div class="back-btn-box">
        <a href="index.html" class="btn-download" id="homeBtn">Back To Home</a>
    </div>

    <script>
        // भाषा सेट करने के लिए (Home Page की सेटिंग के अनुसार)
        window.onload = function() {
            let lang = localStorage.getItem("preferredLang") || "EN";
            if (lang === "HI") {
                document.getElementById("pageTitle").innerText = "मेरी फोटो गैलरी";
                document.getElementById("homeBtn").innerText = "वापस होम पर";
            } else {
                document.getElementById("pageTitle").innerText = "My Photo Gallery";
                document.getElementById("homeBtn").innerText = "Back To Home";
            }
        };

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById("themeBtn");
            if (body.getAttribute("data-theme") === "dark") {
                body.setAttribute("data-theme", "light");
                btn.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
            } else {
                body.setAttribute("data-theme", "dark");
                btn.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
            }
        }

        function openLightbox(src) {
            document.getElementById("lightboxImg").src = src;
            document.getElementById("lightbox").style.display = "flex";
        }

        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
        }

        function triggerDownload(element, event) {
            const originalHTML = element.innerHTML;
            element.innerHTML = '<i class="fas fa-spinner"></i> Downloading...';
            setTimeout(() => {
                element.innerHTML = '<i class="fas fa-check"></i> Saved!';
                setTimeout(() => { element.innerHTML = originalHTML; }, 2000);
            }, 2000);
        }
    </script>
</body>
</html>
