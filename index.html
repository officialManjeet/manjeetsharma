<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Manjeet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100%;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            /* Background image path check kar lena */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('images/bg.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .left-content { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .name { 
            font-size: clamp(2.5rem, 8vw, 5.5rem); 
            line-height: 0.9; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .lang-switch { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 1000;
        }

        #langBtn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 22px;
            cursor: pointer;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: 0.4s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #langBtn:hover { 
            background: white; 
            color: black; 
            transform: scale(1.1); 
        }

        .socials { 
            display: flex; 
            gap: 20px; 
            margin: 5px 0;
        }
        .socials a { 
            fill: white; 
            transition: 0.3s ease;
            width: 28px;
            height: 28px;
        }
        .socials a:hover { transform: translateY(-5px); }
        .insta:hover { fill: #E1306C; }
        .fb:hover { fill: #1877F2; }
        .tw:hover { fill: #1DA1F2; }

        .bio { 
            font-size: 1rem; 
            line-height: 1.6; 
            max-width: 420px; 
            color: #ccc; 
        }

        .right-content { flex: 1; text-align: right; }
        .nav-links { list-style: none; display: inline-block; width: 100%; max-width: 260px; }
        .nav-links li { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px 0; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; font-size: 1.2rem; display: block; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links a:hover { padding-right: 10px; color: #aaa; }

        @media (max-width: 768px) {
            .container { flex-direction: column; text-align: center; gap: 40px; }
            .left-content { align-items: center; text-align: center; }
            .right-content { text-align: center; }
            .name { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-content">
            <h1 class="name" id="mainTitle">Official<br>Manjeet</h1>
            
            <div class="socials">
                <!-- Instagram (Aapka Link) -->
                <a href="https://www.instagram.com" class="insta" target="_blank" aria-label="Instagram">
                    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z""")/>></svg>
                </a>
                <!-- Facebook (Aapka Link) -->
                <a href="https://www.facebook.com" class="fb" target="_blank" aria-label="Facebook">
                    <svg viewBox="0 0 24 24"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z""")/>></svg>
                </a>
                <!-- X (Aapka Link) -->
                <a href="https://x.com" class="tw" target="_blank" aria-label="X (Twitter)">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z""")/>></svg>
                </a>
            </div>

            <p class="bio" id="bioText">
                I love fashion. I love the thrill of wearing a new piece and giving it a story. This passion has taken me to many different places. Enter my world.
            </p>
        </div>

        <div class="right-content">
            <ul class="nav-links">
                <li><a href="about.html" id="link1">About Me</a></li>
                <li><a href="photos.html" id="link2">Gallery</a></li>
                <li><a href="videos.html" id="link3">Highlights</a></li>
                <li><a href="stories.html" id="link4">Stories</a></li>
                <li><a href="trading.html" id="link5">The Trade Desk</a></li>
                <li><a href="shop.html" id="link6">Shop</a></li>
            </ul>
        </div>
    </div>

    <div class="lang-switch">
        <button onclick="changeLang()" id="langBtn">हिन्दी / EN</button>
    </div>

    <script>
        function changeLang() {
            let currentLang = localStorage.getItem("preferredLang") || "EN";
            let nextLang = (currentLang === "EN") ? "HI" : "EN";
            localStorage.setItem("preferredLang", nextLang);
            applyLang();
        }

        function applyLang() {
            let lang = localStorage.getItem("preferredLang") || "EN";
            let title = document.getElementById("mainTitle");
            let bio = document.getElementById("bioText");
            let btn = document.getElementById("langBtn");
            let l1 = document.getElementById("link1"), l2 = document.getElementById("link2"), 
                l3 = document.getElementById("link3"), l4 = document.getElementById("link4"), 
                l5 = document.getElementById("link5"), l6 = document.getElementById("link6");

            if (lang === "HI") {
                if(title) title.innerHTML = "ऑफिशियल<br>मंजीत";
                if(bio) bio.innerHTML = "नमस्ते! मैं मंजीत हूँ। मुझे फैशन का जुनून है और मैं हर नए पहनावे को एक कहानी की तरह देखता हूँ।";
                if(btn) btn.innerHTML = "English";
                if(l1) l1.innerHTML = "मेरे बारे में"; 
                if(l2) l2.innerHTML = "गैलरी"; 
                if(l3) l3.innerHTML = "खास बातें";
                if(l4) l4.innerHTML = "कहानियां"; 
                if(l5) l5.innerHTML = "ट्रेडिंग डेस्क"; 
                if(l6) l6.innerHTML = "दुकान";
            } else {
                if(title) title.innerHTML = "Official<br>Manjeet";
                if(bio) bio.innerHTML = "I love fashion. I love the thrill of wearing a new piece and giving it a story. This passion has taken me to many different places. Enter my world.";
                if(btn) btn.innerHTML = "हिन्दी / EN";
                if(l1) l1.innerHTML = "About Me"; 
                if(l2) l2.innerHTML = "Gallery"; 
                if(l3) l3.innerHTML = "Highlights";
                if(l4) l4.innerHTML = "Stories"; 
                if(l5) l5.innerHTML = "The Trade Desk"; 
                if(l6) l6.innerHTML = "Shop";
            }
        }
        
        // Initialize language on page load
        window.onload = applyLang;
    </script>
</body>
</html>
